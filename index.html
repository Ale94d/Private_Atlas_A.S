<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Atlas A.S</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- BOTÓN SIDEBAR -->
<button id="toggle-sidebar" class="toggle-btn">☰</button>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h1 class="logo">Private Atlas</h1>
        <span class="logo-sub">A.S</span>
    </div>

    <nav class="sidebar-nav">
        <button class="nav-btn" data-section="home">🏠 <span>Inicio</span></button>
        <button class="nav-btn" data-section="planner">📅 <span>Planificador</span></button>
        <button class="nav-btn" data-section="journal">📖 <span>Diario</span></button>
        <button class="nav-btn" data-section="library">📚 <span>Biblioteca</span></button>
        <button class="nav-btn" data-section="mood">🎧 <span>Música</span></button>
    </nav>

    <div class="sidebar-footer">
        <button class="lang-btn active" data-lang-select="es">ES</button>
        <button class="lang-btn" data-lang-select="en">EN</button>
    </div>
</aside>

<!-- ESCRITORIO -->
<main class="desktop" id="desktop">
    <div id="desktop-welcome" class="desktop-welcome">
        <h2>Bienvenido</h2>
        <p>Selecciona una opción</p>
    </div>
</main>

<!-- TEMPLATE VENTANA -->
<template id="window-template">
    <div class="window">
        <div class="window-header">
            <h3 class="window-title"></h3>
            <button class="window-close">✖</button>
        </div>
        <div class="window-content"></div>
    </div>
</template>

<!-- HOME -->
<template id="content-home">
    <h2>Hola 👋</h2>
    <p class="phrase-text"></p>
</template>

<!-- PLANNER -->
<template id="content-planner">
    <input class="task-input" placeholder="Nueva tarea">
    <button class="add-task">Agregar</button>
    <ul class="task-list"></ul>
</template>

<!-- JOURNAL -->
<template id="content-journal">
    <textarea class="journal-text" placeholder="Escribe..."></textarea>
    <button class="save-journal">Guardar</button>
</template>

<!-- LIBRARY -->
<template id="content-library">
    <div class="book-grid">
        <div class="book-card" data-file="libro1.pdf">📘 Libro 1</div>
        <div class="book-card" data-file="libro2.pdf">📙 Libro 2</div>
    </div>
</template>

<!-- MUSIC -->
<template id="content-mood">
    <input class="spotify-link" placeholder="Link Spotify">
    <button class="load-spotify">Cargar</button>
    <div class="player"></div>
</template>

<script src="script.js"></script>
</body>
</html>
